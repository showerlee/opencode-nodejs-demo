<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Beautiful Product Management System with Node.js and React">
    <meta name="theme-color" content="#667eea">
    <title>Product Management System | Node.js + React</title>
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
      /* Smooth page load */
      body {
        opacity: 0;
        animation: pageLoad 0.8s ease forwards;
      }
      
      @keyframes pageLoad {
        to {
          opacity: 1;
        }
      }
      
      /* Loading screen */
      #root:empty::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      #root:empty::after {
        content: 'Loading beautiful interface... 🚀';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 20px);
        color: white;
        font-size: 1.2rem;
        font-weight: 500;
        animation: pulse 2s infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
